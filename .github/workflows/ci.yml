name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + compile + tests ──
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install ruff pytest pytest-asyncio httpx

      - name: Ruff lint
        run: uv run ruff check .

      - name: Python compileall
        run: uv run python -m compileall -q app/

      - name: Pytest
        run: uv run pytest --tb=short -q

  # ── Frontend: tsc + Biome + build ──
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Biome lint
        run: npx biome check --max-diagnostics=50 .

      - name: Vite build
        run: npm run build

  # ── Orphan components audit ──
  orphans:
    name: Orphan Audit
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Run orphan audit
        run: |
          COUNT=$(python3 scripts/audit-orphans.py 2>/dev/null | grep "→" | grep -oP '\d+')
          BASELINE=16
          if [ -z "$COUNT" ]; then
            echo "✅ No orphan components"
          elif [ "$COUNT" -le "$BASELINE" ]; then
            echo "✅ Orphan count OK ($COUNT ≤ baseline $BASELINE)"
          else
            NEW=$((COUNT - BASELINE))
            echo "❌ $NEW NEW orphan component(s) found (total: $COUNT, baseline: $BASELINE)"
            exit 1
          fi

  # ── Security scan ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          if git grep -nPi "(api_key|secret|password|token)\s*=\s*['\"][^'\"$]{6,}['\"]" \
               -- ':!*.example' ':!*test*' ':!.github/' ':!docs/' 2>/dev/null; then
            echo "❌ Hardcoded secrets found — remove before merging"
            exit 1
          fi
          echo "✅ No hardcoded secrets"

      - name: Scan for dangerous patterns
        run: |
          if git grep -nPE "os\.system\(|shell\s*=\s*True|pickle\.loads?\(|eval\(|exec\(" \
               -- '*.py' ':!*test*' 2>/dev/null; then
            echo "❌ Dangerous patterns found"
            exit 1
          fi
          echo "✅ No dangerous patterns"

  # ── Docker Compose config validation ──
  compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose config
        run: |
          cp .env.example .env
          docker compose config --quiet 2>&1 || {
            echo "❌ docker-compose.yml is invalid"
            exit 1
          }
          echo "✅ docker-compose.yml valid"
