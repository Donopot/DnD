name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          else
            python -m pip install ruff pytest pytest-asyncio httpx
          fi

      - name: Ruff lint
        run: python -m ruff check .

      - name: Python compile
        run: python -m compileall -q app

      - name: Pytest
        run: python -m pytest --tb=short -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --pretty false

      - name: Biome check
        run: |
          if npm exec -- biome --version >/dev/null 2>&1; then
            npm exec -- biome check --max-diagnostics=50 .
          else
            echo "Biome is not installed on this ref; skipping."
          fi

      - name: Vite build
        run: npm run build

  compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: |
          cp .env.example .env
          docker compose config --quiet

  repository-audit:
    name: Repository Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          if git grep -nPi "(api_key|secret|password|token)\s*=\s*['\"][^'\"\$]{6,}['\"]" \
              -- ':!*.example' ':!*test*' ':!.github/' ':!docs/' 2>/dev/null; then
            echo "Hardcoded secret-like value found."
            exit 1
          fi

      - name: Scan for dangerous Python patterns
        run: |
          if git grep -nPE "os\.system\(|shell\s*=\s*True|pickle\.loads?\(|eval\(|exec\(" \
              -- '*.py' ':!*test*' 2>/dev/null; then
            echo "Dangerous Python pattern found."
            exit 1
          fi

      - name: Orphan component audit
        run: |
          if [ ! -f scripts/audit-orphans.py ]; then
            echo "scripts/audit-orphans.py not present on this ref; skipping."
            exit 0
          fi

          output="$(python3 scripts/audit-orphans.py frontend/src)"
          echo "$output"

          count="$(printf '%s\n' "$output" | sed -nE 's/.*[^0-9]([0-9]+) orphan.*/\1/p' | tail -n 1)"
          baseline=18

          if [ -z "$count" ] || [ "$count" -le "$baseline" ]; then
            echo "Orphan count OK (${count:-0} <= ${baseline})."
            exit 0
          fi

          echo "$((count - baseline)) new orphan component(s) found (total: $count, baseline: $baseline)."
          exit 1

  e2e:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend, compose]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d --wait

      - name: Seed test data
        run: |
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then break; fi
            sleep 2
          done
          # Seed a test user + campaign if a seed script exists
          if [ -f scripts/seed-test-data.sh ]; then
            bash scripts/seed-test-data.sh
          fi

      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/

      - name: Tear down
        if: always()
        run: docker compose down -v
